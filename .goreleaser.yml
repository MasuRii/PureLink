version: 2

project_name: purelink

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: purelink
    main: ./cmd/purelink
    binary: purelink
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: purelink
    ids:
      - purelink
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

homebrew_casks:
  - name: purelink
    repository:
      owner: MasuRii
      name: homebrew-tap
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/MasuRii/PureLink"
    description: "CLI toolkit for vetting endpoints, IPs, and domains"
    license: MIT
    skip_upload: auto
    binaries:
      - purelink

scoops:
  - name: purelink
    repository:
      owner: MasuRii
      name: scoop-bucket
      branch: main
      token: "{{ .Env.SCOOP_BUCKET_GITHUB_TOKEN }}"
    description: "CLI toolkit for vetting endpoints, IPs, and domains"
    license: MIT
    homepage: "https://github.com/MasuRii/PureLink"
    skip_upload: auto

winget:
  - name: purelink
    publisher: MasuRii
    license: MIT
    license_url: "https://github.com/MasuRii/PureLink/blob/master/LICENSE"
    copyright: MasuRii
    homepage: "https://github.com/MasuRii/PureLink"
    short_description: "CLI toolkit for vetting endpoints, IPs, and domains"
    package_identifier: MasuRii.PureLink
    url_template: "https://github.com/MasuRii/PureLink/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    skip_upload: true
    release_notes: "{{.Changelog}}"
    tags:
      - golang
      - cli
      - security
      - networking
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    repository:
      owner: MasuRii
      name: winget-pkgs
      branch: "purelink-{{.Version}}"
      token: "{{ .Env.WINGET_GITHUB_TOKEN }}"
      pull_request:
        enabled: true
        draft: true
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master

release:
  github:
    owner: MasuRii
    name: PureLink
  draft: true
