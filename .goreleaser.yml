version: 2

project_name: purelink

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: purelink
    main: ./cmd/purelink
    binary: purelink
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: purelink
    ids:
      - purelink
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

sboms:
  - artifacts: archive
  - id: source
    artifacts: source

release:
  github:
    owner: MasuRii
    name: PureLink
  draft: true
