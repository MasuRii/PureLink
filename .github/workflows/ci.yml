name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'
          cache: true
      - name: Check formatting
        run: |
          fmt_out=$(gofmt -d $(go list -f '{{.Dir}}' ./...))
          if [ -n "$fmt_out" ]; then
            echo "$fmt_out"
            echo "::error::Go code is not formatted. Run 'make fmt' to fix."
            exit 1
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'
          cache: true
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: --config=.golangci.yml

  vuln:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  sec:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'
          cache: true
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: Run gosec
        run: gosec ./...

  test:
    name: Test
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'
          cache: true
      - name: Run unit tests with race detector (with coverage)
        if: matrix.os == 'ubuntu-latest'
        run: go test -v -race -coverprofile=coverage.out ./...
      - name: Run unit tests with race detector
        if: matrix.os != 'ubuntu-latest'
        run: go test -v -race ./...
      - name: Benchmark smoke test
        shell: bash
        run: go test -bench=. -benchtime=1x -run=^$ ./...
      - name: Coverage summary
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: go tool cover -func=coverage.out | tail -n 1
      - name: Coverage gate
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          total=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${total}%"
          min_total=35.0
          if awk "BEGIN {exit !(${total} < ${min_total})}"; then
            echo "::error::Coverage ${total}% is below minimum ${min_total}%"
            exit 1
          fi
      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 30

  cgo-verify:
    name: CGO Disabled Verification
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'
          cache: true
      - name: Build with CGO_ENABLED=0
        run: CGO_ENABLED=0 go build -ldflags "-s -w" -o purelink-static ./cmd/purelink
      - name: Verify static binary
        shell: bash
        run: |
          go version -m purelink-static | grep -i "cgo" || true
          if command -v file >/dev/null 2>&1; then
            file purelink-static || true
          fi
          if command -v ldd >/dev/null 2>&1; then
            echo "Checking dynamic linkage:"
            ldd purelink-static || true
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'
          cache: true
      - name: Build binary
        run: make build
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: purelink-binary
          path: bin/purelink
          retention-days: 30
