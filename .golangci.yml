run:
  timeout: 5m
  tests: true

linters:
  enable:
    - copyloopvar
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - misspell
    - nakedret
    - staticcheck
    - unconvert
    - unused
    - wastedassign
    - whitespace

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
